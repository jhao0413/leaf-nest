services:
  app:
    image: jhao0413/leaf-nest:${LEAF_NEST_TAG:-latest}
    depends_on:
      migrate:
        condition: service_completed_successfully
      storage-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      APP_URL: ${SELF_HOST_APP_URL:-http://localhost:8787}
      API_PORT: '8787'
      DATABASE_URL: ${SELF_HOST_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/leaf_nest}
      BETTER_AUTH_URL: ${SELF_HOST_BETTER_AUTH_URL:-http://localhost:8787}
      S3_ENDPOINT: ${SELF_HOST_S3_ENDPOINT:-http://rustfs:9000}
      S3_PUBLIC_ENDPOINT: ${SELF_HOST_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-leaf-nest}
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      S3_FORCE_PATH_STYLE: 'true'
    ports:
      - '8787:8787'

  migrate:
    image: jhao0413/leaf-nest:${LEAF_NEST_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${SELF_HOST_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/leaf_nest}
    command: ['pnpm', 'db:migrate']
    restart: 'no'

  storage-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      S3_BUCKET: ${S3_BUCKET:-leaf-nest}
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        mc alias set rustfs http://rustfs:9000 "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY"
        mc mb --ignore-existing "rustfs/$$S3_BUCKET"
    restart: 'no'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leaf_nest}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    command: /data
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_CORS_ALLOWED_ORIGINS: ${RUSTFS_CORS_ALLOWED_ORIGINS:-*}
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: ${RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS:-*}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - rustfs-data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -f http://localhost:9000/health && curl -f http://localhost:9001/health'
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  postgres-data:
  rustfs-data:
